<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Calculator</title>

<style>
:root{
  --bg:#000;
  --btn:#1c1c1e;
  --btn2:#2c2c2e;
  --orange:#ff9f0a;
  --text:#fff;
}

body{
  margin:0;
  background:var(--bg);
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
}

.app{
  width:340px;
}

.screen{
  color:var(--text);
  font-size:64px;
  text-align:right;
  padding:20px 10px 30px;
  min-height:90px;
  overflow:hidden;
}

.keys{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:12px;
}

button{
  border:none;
  height:72px;
  border-radius:50%;
  font-size:26px;
  color:var(--text);
  background:var(--btn);
  position:relative;
  transition:transform .12s ease, filter .12s ease;
  box-shadow:
    0 6px 18px rgba(0,0,0,.5),
    inset 0 1px 1px rgba(255,255,255,.06);
}

/* glow subtil dynamique */
button::after{
  content:"";
  position:absolute;
  inset:0;
  border-radius:50%;
  background:radial-gradient(circle at 30% 30%, rgba(255,255,255,.15), transparent 60%);
  opacity:.4;
}

/* press feel */
button:active{
  transform:scale(.92);
  filter:brightness(1.2);
}

/* operators */
.op{
  background:var(--orange);
  color:#fff;
  box-shadow:0 6px 20px rgba(255,159,10,.3);
}

.zero{
  grid-column:span 2;
  border-radius:36px;
  text-align:left;
  padding-left:28px;
}
</style>
</head>

<body>

<div class="app">
  <div class="screen" id="screen">0</div>

  <div class="keys">
    <button onclick="reset()">AC</button>
    <button onclick="input('/')">÷</button>
    <button onclick="input('*')">×</button>
    <button class="op" onclick="input('-')">−</button>

    <button onclick="input('7')">7</button>
    <button onclick="input('8')">8</button>
    <button onclick="input('9')">9</button>
    <button class="op" onclick="input('+')">+</button>

    <button onclick="input('4')">4</button>
    <button onclick="input('5')">5</button>
    <button onclick="input('6')">6</button>
    <button onclick="input('.')">.</button>

    <button onclick="input('1')">1</button>
    <button onclick="input('2')">2</button>
    <button onclick="input('3')">3</button>
    <button class="op" onclick="calc()">=</button>

    <button class="zero" onclick="input('0')">0</button>
  </div>
</div>

<script>
let screen = document.getElementById("screen");

function input(v){
  if(screen.innerText==="0") screen.innerText="";
  screen.innerText += v;
}

function reset(){
  screen.innerText="0";
}

function calc(){
  try{
    screen.innerText = eval(screen.innerText);
  }catch{
    screen.innerText="Error";
  }
}
</script>

</body>
</html>
