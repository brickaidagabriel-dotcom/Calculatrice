/* ── Display ── */

.expr-line {

.main-num {

.main-num.s1 { font-size: 76px; letter-spacing: -3px; }
.main-num.s2 { font-size: 58px; letter-spacing: -2px; }
.main-num.s3 { font-size: 42px; letter-spacing: -1px; }

/* ── Grille ── */
.grid {
display: grid;
grid-template-columns: repeat(4, 1fr);
gap: clamp(6px, 2vw, 10px);
padding: clamp(6px, 2vw, 10px);
padding-bottom: max(clamp(6px, 2vw, 10px), env(safe-area-inset-bottom, 6px));
}

/* ── Bouton base ── */
.btn {
aspect-ratio: 1 / 1;
border-radius: 50%;
border: none;
cursor: pointer;
outline: none;
display: flex;
align-items: center;
justify-content: center;
font-family: -apple-system, “SF Pro Display”, “Helvetica Neue”, sans-serif;
font-weight: 400;
color: #fff;
user-select: none;
-webkit-user-select: none;
will-change: transform;
position: relative;
}

/* ── Couleurs de base ── */
.gray   { background-color: #636366; }
.dark   { background-color: #2c2c2e; }
.orange { background-color: #f0a030; }

/* ── Effet lueur sur la tranche supérieure ──
Inner shadow blanc très subtil en haut = reflet de lumière sur le bord du bouton rond,
exactement comme sur le screenshot iOS */
.gray   { box-shadow: inset 0 1.5px 1px rgba(255,255,255,0.22); }
.dark   { box-shadow: inset 0 1.5px 1px rgba(255,255,255,0.10); }
.orange { box-shadow: inset 0 1.5px 1px rgba(255,255,255,0.28); }

/* ── Opérateur actif ── */
.orange.op-active {
background-color: #ffffff;
color: #f0a030;
box-shadow: inset 0 1.5px 1px rgba(240,160,48,0.18);
}

/* ── Taille des textes/icônes par catégorie ── */

/* Chiffres 0-9 */
.digit-btn { font-size: clamp(26px, 7.5vw, 36px); }

/* ⌫ : SVG — taille calée sur ~45% du diamètre bouton */
.bk-icon {
width: clamp(30px, 8.5vw, 40px);
height: auto;
pointer-events: none;
}

/* AC : même gabarit que les chiffres mais légèrement plus petit */
.ac-btn { font-size: clamp(24px, 7vw, 32px); font-weight: 500; letter-spacing: -0.5px; }

/* % : idem AC */
.pct-btn { font-size: clamp(24px, 7vw, 32px); font-weight: 400; }

/* Opérateurs orange : plus grands — ~55% du diamètre */
.op-btn { font-size: clamp(30px, 9vw, 44px); font-weight: 300; line-height: 1; }

/* = un poil plus petit que les autres opérateurs pour l’équilibre visuel */
.eq-btn { font-size: clamp(28px, 8.5vw, 40px); font-weight: 300; }

/* +/- petit texte */
.pm-btn  { font-size: clamp(20px, 5.5vw, 26px); font-weight: 400; }

/* Virgule */
.dot-btn { font-size: clamp(30px, 9vw, 44px); font-weight: 500; line-height: 1; padding-top: 4px; }
</style>

</head>

  </div>

<script>
(function () {
  let cur = '0', first = null, op = null;
  let waitNext = false, justCalc = false, expr = '';

  const numEl  = document.getElementById('num');
  const exprEl = document.getElementById('expr');

  function fmt(v) {
    if (v === 'ERR') return 'Erreur';
    let s = v.toString();
    let neg = s[0] === '-';
    let body = neg ? s.slice(1) : s;
    let [int, dec] = body.split('.');
    int = int.replace(/\B(?=(\d{3})+(?!\d))/g, '\u202f');
    let r = (neg ? '−' : '') + int;
    if (dec !== undefined) r += ',' + dec;
    else if (s.endsWith('.')) r += ',';
    return r;
  }

  function render() {
    numEl.textContent  = fmt(cur);
    exprEl.textContent = expr;
    const L = numEl.textContent.replace(/[\s\u202f,−]/g, '').length;
    numEl.className = 'main-num' + (L > 12 ? ' s3' : L > 9 ? ' s2' : L > 6 ? ' s1' : '');
  }

  function compute(a, o, b) {
    a = parseFloat(a); b = parseFloat(b);
    if (o === '+') return a + b;
    if (o === '−') return a - b;
    if (o === '×') return a * b;
    if (o === '÷') return b === 0 ? 'ERR' : a / b;
  }

  function tidy(n) {
    if (n === 'ERR') return 'ERR';
    return parseFloat(n.toPrecision(12)).toString();
  }

  const opMap = { '÷': 'btn-div', '×': 'btn-mul', '−': 'btn-sub', '+': 'btn-add' };

  function hiliteOp(o) {
    Object.values(opMap).forEach(id => document.getElementById(id).classList.remove('op-active'));
    if (o && opMap[o]) document.getElementById(opMap[o]).classList.add('op-active');
  }

  function animTap(el) {
    el.style.transition = 'transform 0.07s ease, filter 0.07s';
    el.style.transform  = 'scale(0.88)';
    el.style.filter     = 'brightness(1.4)';
    setTimeout(() => {
      el.style.transform = 'scale(1.0)';
      el.style.filter    = '';
      setTimeout(() => { el.style.transition = ''; }, 110);
    }, 80);
  }

  function doDigit(v) {
    if (waitNext || justCalc) {
      cur = v; waitNext = false; justCalc = false; hiliteOp(null);
    } else {
      if (cur === '0' && v !== '0') cur = v;
      else if (cur === '0' && v === '0') {}
      else if (cur.replace(/[-.\u202f]/g, '').length < 9) cur += v;
    }
    expr = '';
  }

  function doDecimal() {
    if (waitNext || justCalc) { cur = '0.'; waitNext = false; justCalc = false; hiliteOp(null); }
    else if (!cur.includes('.')) cur += '.';
    expr = '';
  }

  function doBack() {
    if (justCalc) { cur = '0'; justCalc = false; }
    else { cur = cur.length > 1 ? cur.slice(0, -1) : '0'; }
    expr = '';
  }

  function doAC() {
    cur = '0'; first = null; op = null;
    waitNext = false; justCalc = false; expr = '';
    hiliteOp(null);
  }

  function doOp(newOp) {
    if (justCalc) justCalc = false;
    if (first !== null && !waitNext) {
      let r = compute(first, op, cur);
      if (r === 'ERR') { cur = 'ERR'; first = null; op = null; expr = ''; render(); return; }
      cur = tidy(r); first = cur;
    } else { first = cur; }
    op = newOp; waitNext = true; hiliteOp(newOp); expr = '';
  }

  function doEqual() {
    if (op && first !== null) {
      expr = fmt(first) + ' ' + op + ' ' + fmt(cur) + ' =';
      let r = compute(first, op, cur);
      cur = r === 'ERR' ? 'ERR' : tidy(r);
      first = null; op = null; waitNext = false; justCalc = true;
      hiliteOp(null);
    }
  }

  function doPM() {
    if (cur !== '0' && cur !== 'ERR')
      cur = cur[0] === '-' ? cur.slice(1) : '-' + cur;
  }

  function doPct() {
    let n = parseFloat(cur);
    if (!isNaN(n)) {
      if (first !== null && (op === '+' || op === '−')) cur = tidy(parseFloat(first) * n / 100);
      else cur = tidy(n / 100);
    }
  }

  const actions = {
    'btn-back': doBack,
    'btn-ac':   doAC,
    'btn-pct':  doPct,
    'btn-div':  () => doOp('÷'),
    'btn-7': () => doDigit('7'), 'btn-8': () => doDigit('8'), 'btn-9': () => doDigit('9'),
    'btn-mul': () => doOp('×'),
    'btn-4': () => doDigit('4'), 'btn-5': () => doDigit('5'), 'btn-6': () => doDigit('6'),
    'btn-sub': () => doOp('−'),
    'btn-1': () => doDigit('1'), 'btn-2': () => doDigit('2'), 'btn-3': () => doDigit('3'),
    'btn-add': () => doOp('+'),
    'btn-pm':  doPM,
    'btn-0':   () => doDigit('0'),
    'btn-dot': doDecimal,
    'btn-eq':  doEqual,
  };

  Object.entries(actions).forEach(([id, fn]) => {
    const el = document.getElementById(id);
    if (!el) return;
    el.addEventListener('touchstart', e => {
      e.preventDefault(); animTap(el); fn(); render();
    }, { passive: false });
    el.addEventListener('click', () => { animTap(el); fn(); render(); });
  });

  render();
})();
</script>

</body>
